syntax = "proto3";

option java_multiple_files = true;

package anki.frontend;

import "anki/scheduler.proto";
import "anki/generic.proto";
import "anki/search.proto";
import "anki/decks.proto";

service FrontendService {
  // Returns values from the reviewer
  rpc GetSchedulingStatesWithContext(generic.Empty)
      returns (SchedulingStatesWithContext);
  // Updates reviewer state
  rpc SetSchedulingStates(SetSchedulingStatesRequest) returns (generic.Empty);

  // Returns the deck tree plus the extra context the deck browser needs,
  // bundled into a single request.
  rpc GetDeckBrowserContent(generic.Empty) returns (DeckBrowserContent);

  // Returns everything the deck overview screen needs for the current deck,
  // bundled into a single request.
  rpc GetDeckOverviewContent(generic.Empty) returns (DeckOverviewContent);

  // Returns the browse sidebar tree (decks/tags/saved searches/card
  // state/flags/notetypes), each node carrying a ready-to-use search string.
  rpc GetBrowseSidebar(generic.Empty) returns (BrowseSidebarNode);

  // Batch-fetches rendered browser rows for the given ids, avoiding one
  // request per row for the visible window of a virtualized table.
  rpc GetBrowserRows(GetBrowserRowsRequest) returns (BrowserRows);

  // Notify Qt layer so window modality can be updated.
  rpc ImportDone(generic.Empty) returns (generic.Empty);

  rpc SearchInBrowser(search.SearchNode) returns (generic.Empty);

  // Force closing the deck options.
  rpc deckOptionsRequireClose(generic.Empty) returns (generic.Empty);
  // Warns python that the deck option web view is ready to receive requests.
  rpc deckOptionsReady(generic.Empty) returns (generic.Empty);

  // Save colour picker's custom colour palette
  rpc SaveCustomColours(generic.Empty) returns (generic.Empty);
}

service BackendFrontendService {}

message SchedulingStatesWithContext {
  scheduler.SchedulingStates states = 1;
  scheduler.SchedulingContext context = 2;
}

message SetSchedulingStatesRequest {
  string key = 1;
  scheduler.SchedulingStates states = 2;
}

message DeckBrowserContent {
  decks.DeckTreeNode tree = 1;
  int64 current_deck_id = 2;
  string studied_today = 3;
}

message DeckOverviewContent {
  string deck_name = 1;
  // deck["dyn"]: a filtered/cram deck
  bool is_filtered = 2;
  // markdown- or filtered-blurb-rendered server-side, ready to inject
  string description_html = 3;
  // 0 = not a shared deck
  int64 shared_from = 4;
  // deck["ver"], used to build the review URL
  int32 shared_ver = 5;
  uint32 new_count = 6;
  uint32 learn_count = 7;
  uint32 review_count = 8;
  // signed deltas = deck-due-tree total - live count (0 outside v3)
  int32 buried_new = 9;
  int32 buried_learn = 10;
  int32 buried_review = 11;
  bool have_buried = 12;
}

message BrowseSidebarNode {
  enum NodeType {
    ROOT = 0;
    SAVED_SEARCH_ROOT = 1;
    SAVED_SEARCH = 2;
    TODAY_ROOT = 3;
    TODAY = 4;
    FLAG_ROOT = 5;
    FLAG = 6;
    FLAG_NONE = 7;
    CARD_STATE_ROOT = 8;
    CARD_STATE = 9;
    DECK_ROOT = 10;
    DECK_CURRENT = 11;
    DECK = 12;
    NOTETYPE_ROOT = 13;
    NOTETYPE = 14;
    NOTETYPE_TEMPLATE = 15;
    NOTETYPE_FIELD = 16;
    TAG_ROOT = 17;
    TAG_NONE = 18;
    TAG = 19;
  }

  string name = 1;
  NodeType node_type = 2;
  // Parsable search string; empty if this node is not directly searchable
  // (e.g. the root, or section roots that have no aggregate search).
  string search = 3;
  // Deck id / notetype id / flag index / template or field ordinal. 0 if
  // not applicable.
  int64 id = 4;
  bool expanded = 5;
  repeated BrowseSidebarNode children = 6;
}

message GetBrowserRowsRequest {
  repeated int64 ids = 1;
}

message BrowserRows {
  repeated search.BrowserRow rows = 1;
}
